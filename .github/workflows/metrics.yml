name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Hero Metrics Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: Adi-Dcpp
          filename: metrics.base.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_animations: yes
          plugin_introduction: yes
          plugin_introduction_title: yes

      - name: Calendar Heatmap Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: Adi-Dcpp
          filename: metrics.calendar.svg
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Language Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: Adi-Dcpp
          filename: metrics.languages.svg
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

      - name: Activity Timeline Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: Adi-Dcpp
          filename: metrics.activity.svg
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 0
          plugin_activity_filter: issue, pr, release, fork, review, ref/create

      - name: Coding Habits Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: Adi-Dcpp
          filename: metrics.habits.svg
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      - name: LeetCode + Achievements Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: Adi-Dcpp
          filename: metrics.leetcode.svg
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_leetcode: yes
          plugin_leetcode_user: Adi-1205
          plugin_leetcode_sections: solved, skills, recent
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: no
          plugin_achievements_display: compact

      - name: Stargazers Graph Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: Adi-Dcpp
          filename: metrics.stargazers.svg
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_stargazers: yes
          plugin_stargazers_charts_type: graph
